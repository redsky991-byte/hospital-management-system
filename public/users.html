<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Users - MedCare HMS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="fas fa-hospital"></i></div>
      <div>
        <div class="brand-text">MedCare</div>
        <div class="brand-sub">Hospital Management</div>
      </div>
    </div>
    <div class="sidebar-nav-wrapper">
      <ul id="sidebar-nav"></ul>
    </div>
    <div class="sidebar-footer">
      <i class="fas fa-code me-1"></i> Developed by Zulfiqar Ali
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <h5 class="page-title"><i class="fas fa-users-cog me-2 text-primary"></i>User Management</h5>
      </div>
      <div class="topbar-right">
        <span class="site-badge"><i class="fas fa-hospital-alt me-1"></i><span id="site-name"></span></span>
        <div class="user-info">
          <div class="user-avatar"><i class="fas fa-user"></i></div>
          <div class="user-details">
            <div class="user-display-name" id="user-name">Loading...</div>
            <div class="user-role-badge" id="user-role"></div>
          </div>
        </div>
        <button class="btn btn-sm btn-outline-danger" onclick="logout()">
          <i class="fas fa-sign-out-alt me-1"></i>Logout
        </button>
      </div>
    </header>

    <div class="page-content">
      <div class="card">
        <div class="card-header">
          <div class="d-flex align-items-center justify-content-between">
            <span class="section-title"><i class="fas fa-users me-2"></i>System Users</span>
            <button class="btn btn-sm btn-primary" onclick="openAddUser()">
              <i class="fas fa-user-plus me-1"></i>Add User
            </button>
          </div>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table mb-0">
              <thead>
                <tr>
                  <th data-i18n="user_name">Name</th>
                  <th data-i18n="email">Email</th>
                  <th data-i18n="role">Role</th>
                  <th data-i18n="site">Site</th>
                  <th data-i18n="status">Status</th>
                  <th data-i18n="last_login">Last Login</th>
                  <th data-i18n="actions">Actions</th>
                </tr>
              </thead>
              <tbody id="users-tbody">
                <tr><td colspan="6" class="text-center text-muted py-4">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- User Modal -->
  <div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="user-modal-title">Add New User</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="user-form">
            <div class="row g-3">
              <div class="col-12">
                <label class="form-label">Full Name <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="user-name" required>
              </div>
              <div class="col-12">
                <label class="form-label">Email <span class="text-danger">*</span></label>
                <input type="email" class="form-control" id="user-email" required>
              </div>
              <div class="col-12" id="user-password-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" id="user-password" placeholder="Leave blank to keep current">
              </div>
              <div class="col-md-6">
                <label class="form-label">Role</label>
                <select class="form-select" id="user-role">
                  <option value="nurse">Nurse</option>
                  <option value="doctor">Doctor</option>
                  <option value="admin">Admin</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Site</label>
                <select class="form-select" id="user-site">
                  <option value="">Select Site</option>
                </select>
              </div>
              <div class="col-12">
                <div class="form-check form-switch">
                  <input class="form-check-input" type="checkbox" id="user-active" checked>
                  <label class="form-check-label" for="user-active">Active User</label>
                </div>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" id="save-user-btn">
            <i class="fas fa-save me-1"></i>Save User
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/currency.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/users.js"></script>
</body>
</html>
