<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedCare HMS - Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="login-wrapper">
    <div>
      <div class="login-card">
        <!-- Language Selector -->
        <div class="d-flex justify-content-end mb-2">
          <select id="login-lang-select" class="form-select form-select-sm" style="width:auto;font-size:0.78rem">
            <option value="en">English</option>
          </select>
        </div>

        <div class="login-logo">
          <i class="fas fa-hospital"></i>
        </div>
        <h1 class="login-title">MedCare HMS</h1>
        <p class="login-subtitle" data-i18n="hospital_management">Hospital Management System<br><span data-i18n="sign_in">Sign in to your account</span></p>

        <div id="login-error" class="alert alert-danger d-none" role="alert"></div>

        <form id="login-form" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label" data-i18n="email_address">Email Address</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-envelope text-muted"></i></span>
              <input type="email" class="form-control" id="email" placeholder="admin@hospital.com" required autocomplete="username">
            </div>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label" data-i18n="password">Password</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-lock text-muted"></i></span>
              <input type="password" class="form-control" id="password" placeholder="••••••••" required autocomplete="current-password">
              <button class="btn btn-outline-secondary" type="button" id="toggle-pwd" tabindex="-1">
                <i class="fas fa-eye" id="pwd-eye"></i>
              </button>
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100 py-2">
            <i class="fas fa-sign-in-alt me-2"></i><span data-i18n="sign_in">Sign In</span>
          </button>
        </form>

        <div class="mt-4 p-3 bg-light rounded text-center">
          <small class="text-muted">
            <strong data-i18n="default_credentials">Default Credentials</strong><br>
            Email: admin@hospital.com<br>
            Password: Admin@123
          </small>
        </div>
      </div>
      <div class="login-footer">
        Developed by <strong>Zulfiqar Ali</strong> |
        <a href="http://www.maxtechfix.com" target="_blank">www.maxtechfix.com</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/currency.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(() => {});
    }
    // Redirect if already logged in
    if (localStorage.getItem('token')) {
      window.location.href = '/dashboard.html';
    }
    // Password show/hide toggle
    document.getElementById('toggle-pwd').addEventListener('click', () => {
      const pwd = document.getElementById('password');
      const eye = document.getElementById('pwd-eye');
      if (pwd.type === 'password') { pwd.type = 'text'; eye.className = 'fas fa-eye-slash'; }
      else { pwd.type = 'password'; eye.className = 'fas fa-eye'; }
    });
  </script>
</body>
</html>
