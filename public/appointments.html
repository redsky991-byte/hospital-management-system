<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Appointments - MedCare HMS</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon"><i class="fas fa-hospital"></i></div>
      <div>
        <div class="brand-text">MedCare</div>
        <div class="brand-sub">Hospital Management</div>
      </div>
    </div>
    <div class="sidebar-nav-wrapper">
      <ul id="sidebar-nav"></ul>
    </div>
    <div class="sidebar-footer">
      <i class="fas fa-code me-1"></i> Developed by Zulfiqar Ali
    </div>
  </nav>

  <!-- Main Content -->
  <div class="main-content">
    <header class="topbar">
      <div class="topbar-left">
        <h5 class="page-title"><i class="fas fa-calendar-check me-2 text-primary"></i>Appointment Management</h5>
      </div>
      <div class="topbar-right">
        <span class="site-badge"><i class="fas fa-hospital-alt me-1"></i><span id="site-name"></span></span>
        <div class="user-info">
          <div class="user-avatar"><i class="fas fa-user"></i></div>
          <div class="user-details">
            <div class="user-display-name" id="user-name">Loading...</div>
            <div class="user-role-badge" id="user-role"></div>
          </div>
        </div>
        <button class="btn btn-sm btn-outline-danger" onclick="logout()">
          <i class="fas fa-sign-out-alt me-1"></i>Logout
        </button>
      </div>
    </header>

    <div class="page-content">
      <div class="card">
        <div class="card-header">
          <div class="d-flex flex-wrap gap-2 align-items-center justify-content-between">
            <span class="section-title"><i class="fas fa-calendar-alt me-2"></i>Appointments</span>
            <div class="d-flex flex-wrap gap-2 align-items-center">
              <input type="date" class="form-control form-control-sm" id="filter-date" style="width:160px">
              <select class="form-select form-select-sm" id="filter-status" style="width:140px">
                <option value="">All Status</option>
                <option value="scheduled">Scheduled</option>
                <option value="completed">Completed</option>
                <option value="cancelled">Cancelled</option>
              </select>
              <button class="btn btn-sm btn-primary" onclick="openAddAppointment()">
                <i class="fas fa-calendar-plus me-1"></i>New Appointment
              </button>
            </div>
          </div>
        </div>
        <div class="card-body p-0">
          <div class="table-responsive">
            <table class="table mb-0">
              <thead>
                <tr>
                  <th>Patient</th>
                  <th>Date</th>
                  <th>Time</th>
                  <th>Doctor</th>
                  <th>Department</th>
                  <th>Status</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="appointments-tbody">
                <tr><td colspan="7" class="text-center text-muted py-4">Loading...</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Appointment Modal -->
  <div class="modal fade" id="apptModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="appt-modal-title">New Appointment</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <form id="appt-form">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Patient <span class="text-danger">*</span></label>
                <select class="form-select" id="appt-patient" required>
                  <option value="">Select Patient</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Doctor</label>
                <select class="form-select" id="appt-doctor">
                  <option value="">Select Doctor</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Department</label>
                <select class="form-select" id="appt-department">
                  <option value="">Select Department</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Site</label>
                <select class="form-select" id="appt-site">
                  <option value="">Select Site</option>
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label">Date <span class="text-danger">*</span></label>
                <input type="date" class="form-control" id="appt-date" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Time <span class="text-danger">*</span></label>
                <input type="time" class="form-control" id="appt-time" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Status</label>
                <select class="form-select" id="appt-status">
                  <option value="scheduled">Scheduled</option>
                  <option value="completed">Completed</option>
                  <option value="cancelled">Cancelled</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label">Notes</label>
                <textarea class="form-control" id="appt-notes" rows="3" placeholder="Additional notes..."></textarea>
              </div>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-primary" id="save-appt-btn">
            <i class="fas fa-save me-1"></i>Save Appointment
          </button>
        </div>
      </div>
    </div>
  </div>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/appointments.js"></script>
  <script src="/js/shortcuts.js"></script>
</body>
</html>
