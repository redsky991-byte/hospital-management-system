spring.application.name=MedCare HMS
server.port=3000

# SQLite DataSource
spring.datasource.url=jdbc:sqlite:${user.dir}/../data/hospital.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# Disable Spring Boot auto schema creation (we handle it manually)
spring.sql.init.mode=never

# JWT
app.jwt.secret=${JWT_SECRET:medcare-secret-key-2024}
app.jwt.expiration-ms=86400000

# Multipart / uploads
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
